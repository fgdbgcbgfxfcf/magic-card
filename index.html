<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Karten Trick - Vorbereitung</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  height: 100vh;
  overflow: hidden;
   background-image: url(background\ 2026-03-29\ 233904.png);
  color: white;
}

/* Container für alles */
#container {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Überschrift */
h1 {
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
  font-size: 2.2rem;
  margin-bottom: 30px;
  z-index: 10;
  position: relative;
}

/* Auswahl & Button */
select {
  padding: 12px 15px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  margin-bottom: 20px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #ffcc00;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.2s ease;
}
button:hover { background: #ffaa00; transform: scale(1.05); }

/* Fallende Karten */
.falling-card {
  position: absolute;
  width: 40px;
  height: 60px;
  background-size: cover;
  pointer-events: none;
  animation: fall linear infinite;
  z-index: 1;
  opacity: 0.9;
}

@keyframes fall {
  0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>
<div id="container">
  <h1>🃏 Karten Trick - Vorbereitung</h1>

  <p>Wähle die Karte, die später erscheinen soll 👇</p>
  <select id="cardSelect">
    <option value="herz ass 2026-03-29 223829.png">Herz Ass</option>
    <option value="pik könig 2026-03-29 224024.png">Pik König</option>
    <option value="karo7 2026-03-29 224156.png">Karo 7</option>
    <option value="herz dame 2026-03-29 224312.png">Herz Dame</option>
  </select>
  <br>
  <button onclick="prepareAndGo()">Vorbereiten & Zur Trick-Seite</button>
</div>

<script>
function prepareAndGo() {
  const selectedCardImage = document.getElementById('cardSelect').value;
  localStorage.setItem('trickCardImage', selectedCardImage);
  window.location.href = 'index2.html';
}

// Hintergrundkarten animieren
const cards = [
  'herz ass 2026-03-29 223829.png',
  'pik könig 2026-03-29 224024.png',
  'karo7 2026-03-29 224156.png',
  'herz dame 2026-03-29 224312.png'
];

for (let i = 0; i < 30; i++) {
  const cardElem = document.createElement('div');
  cardElem.className = 'falling-card';
  cardElem.style.backgroundImage = `url(${cards[Math.floor(Math.random()*cards.length)]})`;
  cardElem.style.left = Math.random()*100 + 'vw';
  cardElem.style.animationDuration = (5 + Math.random()*5) + 's';
  cardElem.style.animationDelay = Math.random()*5 + 's';
  document.body.appendChild(cardElem);
}
</script>
</body>
</html>
